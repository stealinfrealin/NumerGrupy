services:
  backend:
    build: ./backend
    container_name: med-backend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - med-net
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: med-frontend
    restart: always
    ports:
      - "5173:5173"
    networks:
      - med-net
    depends_on:
      - backend

  db:
    image: mysql:5.7
    container_name: med-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: med_system
      TZ: Europe/Warsaw
    command: --default-time-zone='Europe/Warsaw'
    ports:
      - "3306:3306"
    networks:
      - med-net
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  med-net:
    driver: bridge